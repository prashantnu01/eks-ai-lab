name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint app
        run: ruff check app/

  validate-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: yamllint (relaxed — syntax + obvious errors)
        run: |
          pip install yamllint
          yamllint -d relaxed k8s/ .github/
      - name: kubeconform (validate k8s manifests; skip CRDs like Karpenter)
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz kubeconform
          ./kubeconform -strict -ignore-missing-schemas -summary k8s/

  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container image (no push — just prove the Dockerfile works)
        run: docker build -t bedrock-api:ci ./app
