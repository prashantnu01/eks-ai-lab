# NodePool — WHAT Karpenter is allowed to launch (capacity types, instance
# families, limits, consolidation). Lab 4. API group karpenter.sh/v1.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]      # Spot first, On-Demand fallback
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["t", "m", "c"]             # let Karpenter right-size
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["2"]
  limits:
    cpu: "16"                                 # hard ceiling for the lab (cost guardrail)
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m                      # bin-pack aggressively for cost
